name: Send Lunch Menu

on:
  schedule:
    # 평일 11:15 KST = 02:15 UTC
    - cron: '15 2 * * 1-5'
  workflow_dispatch:  # 수동 실행용

jobs:
  send-menu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch menu & download images
        run: python meal_bot.py --download-only
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit & push images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git diff --staged --quiet && echo "No image changes" && exit 0
          git commit -m "chore: update daily menu images"
          git push

      - name: Wait for GitHub CDN cache
        run: sleep 10

      - name: Send to Slack
        run: python meal_bot.py --send-only
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_REPO: SK-AI-Tech-Innovation/slack-meal-bot
